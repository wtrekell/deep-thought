# Gmail Tool Configuration
# See files/tools/gmail/260323-requirements.md for full documentation.

# Auth
credentials_path: "src/config/gmail/credentials.json"
token_path: "data/gmail/token.json"
scopes:
  - "https://mail.google.com/" # Use 'https://www.googleapis.com/auth/gmail.modify' if permanent delete is not needed

# Gemini AI
gemini_api_key_env: "GEMINI_API_KEY"
gemini_model: "gemini-2.5-flash"
gemini_rate_limit_rpm: 15

# Gmail API
gmail_rate_limit_rpm: 250 # Gmail API default quota; lower to be conservative
retry_max_attempts: 3 # Retry failed Gmail API calls with exponential backoff
retry_base_delay_seconds: 1 # Initial delay doubles on each retry

# Collection
max_emails_per_run: 100
clean_newsletters: true # Strip tracking pixels, social buttons (50-70% reduction)
decision_cache_ttl: 3600 # Seconds to cache AI extraction decisions

# Output
output_dir: "data/gmail/export/"

# Qdrant
qdrant_collection: "deep_thought_db" # Qdrant collection for semantic search; emails are embedded automatically

rules:
  - name: "newsletters"
    query: "label:newsletter"
    ai_instructions: "Extract the main content and key takeaways. Ignore promotional sections."
    actions:
      - archive
      - label:Processed
    save_mode: append # All emails appended to single rule file (options: individual, append, both, none, raw)

  - name: "receipts"
    query: "subject:receipt OR subject:invoice newer_than:7d"
    ai_instructions: "Extract order number, total, merchant, and item list."
    actions:
      - archive
      - label:Receipts
    save_mode: individual # One file per email (default)

  - name: "readwise"
    query: "label:newsletter -label:Forwarded newer_than:7d"
    ai_instructions: null # No AI extraction — forward only
    actions:
      - forward:yourname@feed.readwise.io
      - label:Forwarded
      - archive
    save_mode: none # Action-only rule — no local file needed

  # 'raw' writes the bare AI-extracted body_text to {rule_name}.txt with
  # line-level dedup and no frontmatter — intended for piping into another
  # deep-thought tool (e.g., `web crawl --mode direct --input-file`).
  - name: "article_hunter"
    query: "from:noreply@medium.com newer_than:7d"
    ai_instructions: "Output the article URLs from this digest, one per line, no other text."
    actions:
      - archive
      - label:Processed
    save_mode: raw

  # 'include_spam_trash: true' surfaces Trash/Spam messages that the Gmail
  # API otherwise hides. Required for `in:trash` / `in:spam` queries.
  # Pair with a scoped query and, for 'delete' actions, a throwaway test first.
  - name: "trash_cleanup"
    query: "in:trash older_than:2w"
    ai_instructions: null
    include_spam_trash: true
    actions:
      - delete
    save_mode: none
