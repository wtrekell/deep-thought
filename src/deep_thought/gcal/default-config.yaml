# GCal Tool Configuration
# See files/tools/gcal/260323-requirements.md for full documentation.

# Auth
credentials_path: "src/config/gcal/credentials.json" # Path to OAuth 2.0 client credentials (shared with Gmail if using the same Google Cloud project)
token_path: "data/gcal/token.json"
scopes:
  - "https://www.googleapis.com/auth/calendar"

# Calendar API
api_rate_limit_rpm: 250
retry_max_attempts: 3
retry_base_delay_seconds: 1

# Pull
calendars:
  - "primary"
lookback_days: 7
lookahead_days: 30
include_cancelled: false
single_events: true

# Output
output_dir: "data/gcal/export/"
generate_llms_files: false
flat_output: false
