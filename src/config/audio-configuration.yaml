# Engine
engine: "mlx" # 'mlx' (default), 'whisper', or 'auto' (selects MLX on Apple Silicon)
model: "large-v3-turbo" # 'tiny', 'base', 'small', 'medium', 'large-v3', 'large-v3-turbo'
language: null # null = auto-detect, or ISO 639-1 code (e.g. 'en', 'fr')

# Output mode
output_mode: "paragraph" # 'paragraph', 'segment', or 'timestamp'
pause_threshold: 1.5 # Seconds of silence to trigger paragraph break (paragraph mode only)

# Speaker identification
diarize: false # Enable speaker diarization (requires pyannote.audio + HF token)
hf_token_env: "HF_TOKEN" # Env var holding HuggingFace API token

# Post-processing
remove_fillers: false # Remove filler words (um, uh, like, you know, etc.)

# Output
output_dir: "data/audio/export/" # Directory for markdown transcripts
generate_llms_files: false # Generate .llms.txt / .llms-full.txt aggregate files

# Limits
max_file_size_mb: 500 # Skip files larger than this
chunk_duration_minutes: 5 # MLX only: split audio longer than this into chunks

# Hallucination detection (multi-signal scoring system)
hallucination_detection:
  repetition_threshold: 3 # Max phrase repetitions in a sliding window before flagging
  compression_ratio_threshold: 2.4 # Flag segments with compression ratio above this
  confidence_floor: -1.0 # Flag segments with avg log-probability below this
  no_speech_prob_threshold: 0.6 # Flag segments with no-speech probability above this
  duration_chars_per_sec_max: 25 # Flag segments with text density above this (chars/sec)
  duration_chars_per_sec_min: 2 # Flag segments with text density below this (segments > 0.5s)
  use_vad: true # Use Voice Activity Detector for silence detection
  blocklist_enabled: true # Check segments against known hallucination phrases
  score_threshold: 2 # Number of detection layers that must flag before action
  action: "remove" # 'remove' (delete flagged), 'flag' (mark in output), 'log' (silent)
