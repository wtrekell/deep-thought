# Email (.eml/.msg) extraction
prefer_html: false # Prefer HTML parts over plain text when both exist
full_headers: false # Include all MIME headers in output
include_attachments: true # List attachments in email conversion output

# Output
output_dir: "output/" # Directory for converted markdown files
include_page_numbers: false # Retain page number markers in PDF output
extract_images: true # Extract and save images to subdirectories

# Limits
max_file_size_mb: 200 # Skip files larger than this (must be > 0)

# File filter
allowed_extensions: # Extensions to process (at least one required)
  - ".pdf"
  - ".docx"
  - ".pptx"
  - ".xlsx"
  - ".html"
  - ".htm"
  - ".eml"
  - ".msg"
exclude_patterns: # Glob patterns for files to skip
  - "~$*"
  - ".*"
