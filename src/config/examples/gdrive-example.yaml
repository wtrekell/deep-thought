# =============================================================================
# GDrive Tool — Example Configuration
# All settings shown with every valid option documented.
# Copy to src/config/gdrive-configuration.yaml and customize.
# =============================================================================

# ---------------------------------------------------------------------------
# Auth (OAuth 2.0)
# ---------------------------------------------------------------------------
auth:
  credentials_file: "files/tools/google/client_secret_abc123.apps.googleusercontent.com.json"
                              # Path to the Google OAuth client secret JSON file.
                              # Download from Google Cloud Console → APIs & Services → Credentials.
                              # Required — no default.

  token_file: "src/config/gdrive/token.json"
                              # Path where the OAuth refresh token is written after first login.
                              # On macOS, leave this as an empty string ("") to store the token
                              # in the system keychain instead of a file.
                              # Optional — defaults to "" (keychain storage).

  scopes:                     # Google OAuth scopes to request.
    - "https://www.googleapis.com/auth/drive.file"
                              # Options:
                              #   "https://www.googleapis.com/auth/drive.file"
                              #       — Create and manage only the files this app created.
                              #         Recommended — limits exposure to only backup-created files.
                              #   "https://www.googleapis.com/auth/drive"
                              #       — Full Drive access; required only if you need to read or
                              #         modify files not created by this tool.

# ---------------------------------------------------------------------------
# Backup
# ---------------------------------------------------------------------------
backup:
  source_dir: "/Users/yourname/Documents/my-project"
                              # Absolute path to the local directory to back up.
                              # The entire subtree is walked recursively.
                              # Required — no default.

  drive_folder_id: "1ABCxyz_ExampleFolderIdFromDriveURL"
                              # Google Drive folder ID that will receive the backup.
                              # Find it in the Drive URL: drive.google.com/drive/folders/<id>
                              # Run `gdrive init` to create a new folder and populate this
                              # automatically, or paste an existing folder ID here.
                              # Optional at load time — validated (and required) at backup time.

  exclude_patterns:           # File and directory names to skip during backup.
                              # Patterns match against the file/directory name alone OR
                              # against the path relative to source_dir.
                              # Uses fnmatch glob syntax: * matches anything within a single
                              # path segment (not across directory separators).
                              # Optional — defaults to [] (nothing excluded).
    - "output"                # Exclude any directory or file named "output" at any depth
    - "*.db"                  # Exclude all SQLite database files
    - "*.log"                 # Exclude all log files
    - ".git"                  # Exclude git repositories
    - "__pycache__"           # Exclude Python bytecode directories
    - "node_modules"          # Exclude JavaScript dependency directories
    - ".venv"                 # Exclude Python virtual environments
    - "deep-thought/data"     # Exclude a specific subdirectory by relative path

# ---------------------------------------------------------------------------
# API rate limiting
# ---------------------------------------------------------------------------
api_rate_limit_rpm: 100       # Maximum Drive API calls per minute.
                              # Google's default quota is 1,000 requests per 100 seconds
                              # (~600 rpm). Lower this if you share the project quota with
                              # other applications or see 429 errors.
                              # Optional — defaults to 100.

# ---------------------------------------------------------------------------
# Retry behavior
# ---------------------------------------------------------------------------
retry:
  max_attempts: 3             # Total number of attempts per API call (initial + retries).
                              # Must be a positive integer. Set to 1 to disable retries.
                              # Optional — defaults to 3.

  base_delay_seconds: 2.0     # Delay in seconds before the first retry.
                              # Doubles on each subsequent attempt (exponential backoff):
                              # attempt 1 waits base, attempt 2 waits base*2, etc.
                              # Accepts fractional values (e.g., 0.5, 1.5).
                              # Optional — defaults to 2.0.
