# =============================================================================
# Todoist Tool — Example Configuration
# All settings shown with every valid option documented.
# Copy to src/config/todoist_configuration.yaml and customize.
# =============================================================================

# ---------------------------------------------------------------------------
# Todoist API
# ---------------------------------------------------------------------------
todoist:
  api_token_env:
    "TODOIST_API_TOKEN" # Name of the env var holding your Todoist API token.
    # The value of this env var (not the name) must be set
    # in your .env file or shell before running any command.

# ---------------------------------------------------------------------------
# Projects to sync (opt-in list)
# Only tasks belonging to a project listed here will be pulled or pushed.
# The name must match the exact Todoist project name (case-sensitive).
# ---------------------------------------------------------------------------
projects:
  - name: "Inbox"
  - name: "Work"
  - name: "Personal"

# ---------------------------------------------------------------------------
# Filter rules for pull and push operations
# ---------------------------------------------------------------------------
filters:
  # -------------------------------------------------------------------------
  # Pull filters — control which tasks are fetched from Todoist into SQLite
  # -------------------------------------------------------------------------
  pull:
    labels:
      include:
        ["urgent", "this-week"] # Only pull tasks that carry at least one of these labels.
        # Empty list = no label filter; all tasks pass through.
      exclude:
        ["someday", "waiting"] # Skip tasks that carry any of these labels.
        # Empty list = no exclusion by label.

    projects:
      include:
        ["Work", "Personal"] # Narrow pulls to these project names, overriding the
        # top-level projects list for pull operations.
        # Empty list = use the top-level projects list instead.
      # Note: exclude is not supported for pull.projects — the parser ignores it.
      # To exclude a project, simply omit it from the top-level projects list above.

    sections:
      include:
        ["Active", "In Progress"] # Only pull tasks that live in these sections.
        # Empty list = pull from all sections.
      exclude:
        ["Archive", "Done"] # Skip tasks in these sections.
        # Empty list = no exclusion by section.

    assignee:
      include:
        ["alice@example.com"] # Only pull tasks assigned to these user names or email
        # addresses. Empty list = pull tasks for all assignees.
      # Note: exclude is not supported for pull.assignee — the parser ignores it.

    due:
      has_due_date:
        null # Controls due-date filtering.
        #   null  — Pull all tasks regardless of due date (default)
        #   true  — Only pull tasks that have a due date set
        #   false — Only pull tasks that have no due date

  # -------------------------------------------------------------------------
  # Push filters — control which locally-modified tasks are written back to Todoist
  # -------------------------------------------------------------------------
  push:
    labels:
      include:
        ["urgent", "this-week"] # Only push tasks that carry at least one of these labels.
        # Empty list = no label filter; all modified tasks are eligible.
      exclude:
        ["waiting"] # Skip tasks with these labels when pushing.
        # Empty list = no exclusion by label.

    assignee:
      include:
        ["alice@example.com"] # Only push tasks assigned to these users.
        # Empty list = push for all assignees.
      # Note: exclude is not supported for push.assignee — the parser ignores it.

    conflict_resolution:
      "prompt" # How to handle a conflict when local and remote both changed.
      #   "prompt"      — Ask interactively for each conflict (default)
      #   "remote_wins" — Always keep the Todoist (remote) version
      #   "local_wins"  — Always keep the local (SQLite) version

    require_confirmation:
      true # Whether to prompt before writing any changes back to Todoist.
      #   true  — Show a summary and ask for confirmation (default)
      #   false — Push without prompting (useful in automation)

# ---------------------------------------------------------------------------
# Comment sync settings
# ---------------------------------------------------------------------------
comments:
  sync:
    true # Whether to fetch task comments from Todoist.
    #   true  — Sync comments alongside tasks (default)
    #   false — Skip comment sync entirely

  include_attachments:
    false # Whether to render attachment metadata in exported markdown.
    # Attachment data is always downloaded and stored in SQLite
    # during pull — this flag only controls markdown export output.
    #   true  — Append file name, MIME type, size, and URL to each
    #           comment line that has an attachment
    #   false — Omit attachment metadata from export (default)

# ---------------------------------------------------------------------------
# Claude involvement markers
# Used to identify tasks assigned to Claude and link them to a repository.
# Set claude.label to a Todoist label you apply to tasks you want Claude to handle.
# ---------------------------------------------------------------------------
claude:
  label:
    "claude-code" # Todoist label that marks tasks intended for Claude.
    # Set to null or omit to disable Claude task detection.

  role:
    repo:
      "deep-thought" # Repository name where Claude should work on the task.
      # Required when claude.label is set — validation will warn
      # if label is set but repo is empty.

    branch: "main" # Git branch Claude should target. Defaults to "main".
