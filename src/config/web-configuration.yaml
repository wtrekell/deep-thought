# Web Tool Configuration
mode: "blog" # Crawl mode: 'blog', 'documentation', or 'direct'
max_depth: 3 # Maximum link recursion depth (0+)
max_pages: 100 # Maximum pages to crawl (0 = unlimited)

# Rendering
js_wait: 1.0 # Seconds to wait after page render for JS content (0+)
browser_channel: null # Playwright channel: 'chrome', 'msedge', etc. (null = default)

# Browser
headless: true # Run browser without visible window
stealth: false # Enable stealth mode to avoid bot detection

# URL filtering (regex patterns)
include_patterns: [] # URLs must match at least one to be crawled (empty = all)
exclude_patterns: # URLs matching any of these are skipped
  - '.*\.pdf$'
  - ".*login.*"

# Retry
retry_attempts: 2 # Retry attempts on network failures (0+)
retry_delay: 5.0 # Seconds between retries (0+)

# Output
output_dir: "output/web/" # Directory for crawled pages and metadata
extract_images: false # Download and save images from crawled pages
generate_llms_files: true # Generate llms.txt and llms-full.txt indexes
llms_lookback_days: 30 # Days of history in llms files (0 = current run only)
strip_path_prefix: null # Strip this prefix from URL paths for output file paths
strip_domain: false # Omit domain directory from output file paths

# Pagination (blog and documentation modes only)
pagination: "none" # Strategy for expanding index pages: 'none', 'scroll', or 'click'
pagination_selector: null # CSS selector for the element to click (required when pagination is 'click')
pagination_wait: 2.0 # Seconds to wait after each scroll or click before reading the DOM
max_paginations: 10 # Maximum scroll/click iterations per index page

# Content stripping
unwrap_tags: [] # HTML tags to unwrap — removes the tag but keeps its inner content (e.g., ['span', 'div.wrapper'])
strip_boilerplate: [] # Regex patterns to remove from markdown (e.g., nav menus, footers)

# Content quality
index_depth: 1 # Levels of index/listing pages before articles (must be >= 1)
min_article_words: 200 # Pages below this word count are skipped (must be > 0)
changelog_url: null # Documentation mode only: changelog URL for incremental re-crawls

# Qdrant
qdrant_collection: "deep_thought_db" # Qdrant collection to write embeddings into
