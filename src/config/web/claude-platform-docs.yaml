mode: "documentation"
input_url: "https://platform.claude.com/docs/en/"
index_depth: 1
min_article_words: 100
max_depth: 4
max_pages: 100
js_wait: 1.0
browser_channel: null
headless: true
stealth: false

include_patterns:
  - ".*/docs/en/.*"

exclude_patterns:
  - '.*\.pdf$'
  - ".*#.*"
  - '.*\?.*'
  - ".*login.*"

strip_boilerplate:
  # platform.claude.com Mintlify variant 3: anonymous logo link pattern.
  # Top nav + full sidebar: from the anonymous logo link through the breadcrumbs,
  # stopping just before the first # heading.
  - '^\[\].*?(?=\n# )'
  # "Copy page" button artifact -- appears twice per page immediately after the heading
  - '\nCopy page\n'
  # Mintlify footer: "Was this page helpful?" through the end of the document
  - '\nWas this page helpful\?.*'

qdrant_collection: deep_thought_db
retry_attempts: 2
retry_delay: 5.0
changelog_url: null
strip_path_prefix: "/docs/en"
strip_domain: true
output_dir: "00-local/claude-platform-docs/"
extract_images: false
generate_llms_files: true
llms_lookback_days: 30
unwrap_tags: []
pagination: "none"
pagination_selector: null
pagination_wait: 2.0
max_paginations: 10
