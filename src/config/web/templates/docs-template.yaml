# Documentation template — copy to src/config/web/{site-name}.yaml and customise.
mode: "documentation"
input_url: "https://docs.example.com"

# Changelog URL for incremental re-crawls: if set, only pages linked from the
# changelog are re-fetched on subsequent runs. Omit or set to null for full re-crawls.
changelog_url:
  null
  # changelog_url: "https://docs.example.com/changelog"

# Index depth for documentation sites.
#   1 = root is a nav/landing page; linked pages are docs pages (most common)
index_depth: 1

# Documentation pages can be shorter than blog articles.
min_article_words: 100

max_depth: 4
max_pages: 500
js_wait: 1.0
browser_channel: null
headless: true
stealth: false

include_patterns: []

exclude_patterns:
  - '.*\.pdf$'
  - ".*#.*"
  - ".*login.*"
  - '.*\?.*'

# tag.class patterns to strip wrapper tags from HTML before conversion (e.g., sites that
# wrap every word in animation divs). Preserves the text content of matched tags.
unwrap_tags: []
  # - 'div.word'
  # - 'span.char'

# Regex patterns to remove from converted markdown (e.g., nav menus, footers, cookie banners).
strip_boilerplate: []
  # - 'Was this page helpful\?.*?(?=\n\n|\Z)'
  # - 'Previous\s*\|.*?Next'

retry_attempts: 2
retry_delay: 5.0
output_dir: "docs/"
extract_images: false
generate_llms_files: true
llms_lookback_days: 30 # days of history to include in llms.txt / llms-full.txt (0 = current run only)
strip_path_prefix: null # strip this prefix from URL paths when computing output file paths
strip_domain: false # omit the domain directory from output file paths

# Pagination: use when a doc index or navigation page uses JS to load its full link list.
# pagination: "scroll"   # scroll to the bottom to trigger lazy loading
# pagination: "click"    # click a button to expand content
pagination: "none"
pagination_selector: null # CSS selector for the expand/load button (required when pagination is "click")
pagination_wait: 2.0 # seconds to wait after each scroll or click
max_paginations: 10 # maximum scroll/click iterations per index page
