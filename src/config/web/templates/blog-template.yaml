# Blog template — copy to src/config/web/{site-name}.yaml and customise.
mode: "blog"
input_url: "https://example.com/blog"

# Index depth: how many layers of listing/navigation pages sit before article pages.
#   1 = root URL is a listing page; links from it are articles (most common)
#   2 = root → category pages → article pages
index_depth: 1

# Pages with fewer words than this are treated as index/navigation pages and skipped.
min_article_words: 200

max_pages: 100
js_wait: 1.0
browser_channel: null
headless: true
stealth: false

# Restrict crawling to the blog section and skip common non-article pages.
include_patterns: []
  # - '.*/blog/[^/]+$'

exclude_patterns:
  - '.*\?.*'
  - ".*/tag/.*"
  - ".*/category/.*"
  - '.*/page/\d+'
  - ".*#.*"
  - ".*login.*"
  - '.*\.pdf$'

# tag.class patterns to strip wrapper tags from HTML before conversion (e.g., sites that
# wrap every word in animation divs). Preserves the text content of matched tags.
unwrap_tags: []
  # - 'div.word'
  # - 'span.char'

# Regex patterns to remove from converted markdown (e.g., nav menus, footers, cookie banners).
strip_boilerplate: []
  # - 'Subscribe to our newsletter.*?(?=\n\n|\Z)'
  # - 'Related Posts.*?(?=\n\n|\Z)'

retry_attempts: 2
retry_delay: 5.0
output_dir: "output/web/"
extract_images: false
generate_llms_files: true
llms_lookback_days: 30 # days of history to include in llms.txt / llms-full.txt (0 = current run only)
strip_path_prefix: null # strip this prefix from URL paths when computing output file paths
strip_domain: false # omit the domain directory from output file paths

# Pagination: use when the blog index uses infinite scroll or a "load more" button.
# pagination: "scroll"   # scroll to the bottom to trigger lazy loading
# pagination: "click"    # click a button to load more articles
pagination: "none"
pagination_selector:
  null # CSS selector for the "load more" button (required when pagination is "click")
  # pagination_selector: "button.load-more"
pagination_wait: 2.0 # seconds to wait after each scroll or click
max_paginations: 10 # maximum scroll/click iterations per index page
