mode: "documentation"
input_url: "https://pymupdf.readthedocs.io/en/latest/pymupdf4llm/api.html"
index_depth: 1
min_article_words: 100
max_depth: 4
max_pages: 600
js_wait: 1.0
browser_channel: null
headless: true
stealth: false

include_patterns:
  # All pages under /en/latest/ — full PyMuPDF documentation
  - 'https://pymupdf\.readthedocs\.io/en/latest/.*'

exclude_patterns:
  - '.*\.pdf$'
  - ".*#.*"
  - '.*\?.*'
  - ".*login.*"
  # ReadTheDocs search and genindex pages — not content
  - '.*/search\.html.*'
  - '.*/genindex\.html$'

strip_boilerplate:
  # Furo/ReadTheDocs header: theme controls, hidden sidebar labels, and full sidebar nav
  # rendered at the top of every page — strip everything before the first # heading
  - '^.*?(?=\n# )'
  # Prev/Next page navigation line at the bottom of content pages
  - '\n\[[ \t]*(?:Next|Previous)[^\n]*'
  # Copyright line and everything below it: Sphinx credit, RTD badge links, "On this page" TOC
  - '\nCopyright ©.*'
  # PyMuPDF AS-IS license footer and everything below it (different footer pattern from standard RTD)
  - '\nThis software is provided AS-IS.*'
  # "Copy to clipboard" labels that Sphinx inserts after every code block
  - '\nCopy to clipboard'
  # Pilcrow signs (¶) appended to every heading and method signature
  - "¶"

unwrap_tags: []

retry_attempts: 2
retry_delay: 5.0
changelog_url: null
strip_path_prefix: "/en/latest"
strip_domain: true
output_dir: "00-local/pymupdf/"
qdrant_collection: null
extract_images: false
generate_llms_files: true
llms_lookback_days: 30
pagination: "none"
pagination_selector: null
pagination_wait: 2.0
max_paginations: 10
