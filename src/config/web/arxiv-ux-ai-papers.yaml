mode: "blog"
input_url: "https://arxiv.org/search/advanced?advanced=&terms-0-operator=AND&terms-0-term=ux+OR+%22user+experience%22+OR+%22experience+design%22+OR+%22ux+engineer%22&terms-0-field=title&terms-1-operator=AND&terms-1-term=ai+OR+%22artificial+intelligence%22+OR+%22llm%22+OR+%22large+language+model%22+OR+%22agentic%22&terms-1-field=title&classification-physics_archives=all&classification-include_cross_list=exclude&date-filter_by=past_12&date-year=&date-from_date=&date-to_date=&date-date_type=submitted_date&abstracts=show&size=50&order=-announced_date_first"

# The search results page is the index; individual paper abs pages are the articles.
index_depth: 1

# Paper abs pages have a title, authors, abstract, subjects, and submission history.
# 200 words is enough to capture even short abstracts plus metadata.
min_article_words: 200

max_pages: 100  # 44 collected on initial full run (36 unique papers, some older papers linked from results)
js_wait: 1.0
browser_channel: null
headless: true
stealth: false

# Only follow links to individual paper abstract pages on arxiv.org.
# The search URL itself is the index — it contains query params, so we cannot
# use the blanket ?-exclusion below. The include_pattern ensures only abs pages
# are treated as articles.
include_patterns:
  - 'https://arxiv\.org/abs/\d+\.\d+'

# Exclude everything that is not a paper abstract page.
# Note: we do NOT add '.*\?.*' here because the input_url itself has query params
# and would be blocked at the index stage. The include_patterns above handle
# restricting article collection to abs pages only.
exclude_patterns:
  - '.*\.pdf$'
  - '.*\.ps$'
  - ".*#.*"
  - ".*login.*"
  - 'https://arxiv\.org/pdf/.*'
  - 'https://arxiv\.org/ps/.*'
  - 'https://arxiv\.org/format/.*'
  - 'https://arxiv\.org/html/.*'
  - 'https://arxiv\.org/search/.*'
  - 'https://arxiv\.org/find/.*'
  # Author search links (/search/?searchtype=author&query=...)
  - 'https://arxiv\.org/search/\?.*'
  # External sites linked from abs pages (doi.org, nasa, scholar, etc.)
  - 'https://doi\.org/.*'
  - 'https://ui\.adsabs\.harvard\.edu/.*'
  - 'https://scholar\.google\.com/.*'
  - 'https://www\.semanticscholar\.org/.*'
  - 'https://static\.arxiv\.org/.*'
  - 'https://info\.arxiv\.org/.*'
  - 'https://cornell\.edu/.*'

strip_boilerplate:
  # Site-wide header nav block (skip to content link through login link)
  - 'Skip to main content.*?(?=\n# |\n\*\*\[arXiv)'
  # "View a PDF of the paper..." repeated link text above the abstract
  - 'View a PDF of the paper titled[^\n]+'
  # "Full-text links" section with PDF/HTML/TeX links (server-rendered version)
  - 'Full-text links:.*?(?=\n## |\n\*\*Subjects|\Z)'
  # "Access Paper" section with PDF/HTML/TeX download links
  - '## Access Paper:.*?(?=\n## |\Z)'
  # "Current browse context" sidebar navigation
  - 'Current browse context:.*?(?=\n## |\nReferences|\Z)'
  # References & Citations block with external links
  - 'References & Citations.*?(?=\n## |\nexport BibTeX|\Z)'
  # BibTeX export block through end of citation tools (includes "x\nloading...\nData provided by:")
  - 'export BibTeX citation.*?(?=\n## |\Z)'
  # BibTeX stub that renders when JS doesn't execute (×\nloading...\nData provided by:)
  - '##\sBibTeX formatted citation\n\n×\n\nloading\.\.\.\n\nData provided by:[^\n]*\n\n###'
  # Bookmark / bibliographic tools sidebar
  - 'Bookmark\n.*?(?=\Z)'

unwrap_tags: []

retry_attempts: 2
retry_delay: 5.0

output_dir: "../magrathea/03-topic-research/arxiv/"
extract_images: false
generate_llms_files: true
llms_lookback_days: 30

# Strip /abs from output paths so filenames are the bare paper IDs (e.g., 2603.23863.md)
strip_path_prefix: "/abs"
strip_domain: true

pagination: "none"
pagination_selector: null
pagination_wait: 2.0
max_paginations: 10

qdrant_collection: "deep_thought_db"
