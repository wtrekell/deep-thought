# OAuth credentials
auth:
  credentials_file: "files/tools/google/client_secret_2_770894559256-m7f602spn8c8upeh7tdvodhtotlc1jqa.apps.googleusercontent.com.json"
  token_file: "src/config/gdrive/token.json"
  scopes:
    - "https://www.googleapis.com/auth/drive.file"

# Backup source and destination
backup:
  source_dir: "/Users/williamtrekell/Documents/dont-panic"
  drive_folder_id: "1WFmz-3yq6WaNP8Tnus0yH5gmiTlFLWFE"
  # Paths to skip during backup. Patterns match against the directory or file
  # name alone, or against the path relative to source_dir. Uses fnmatch glob
  # syntax (* matches anything within a single path segment).
  # Examples: "output", "*.db", "deep-thought/output"
  exclude_patterns:
    - "output"
    - "*.db"
    - "*.log"
    - "htmlcov"
    - "tests"
    - "storage"
    - ".venv"
    - "styles"
    - ".mypy_cache"

# API
api_rate_limit_rpm: 100 # Drive API calls per minute

# Retry behavior
retry:
  max_attempts: 3
  base_delay_seconds: 2.0
